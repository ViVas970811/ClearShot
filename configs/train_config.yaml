model:
  base_model: "stable-diffusion-v1-5/stable-diffusion-v1-5"
  controlnet: "lllyasviel/control_v11p_sd15_canny"

lora:
  rank: 16
  alpha: 32
  target_modules: ["to_q", "to_v", "to_k", "to_out.0"]
  learning_rate: 1.0e-4
  weight_decay: 0.01

training:
  batch_size: 1
  gradient_accumulation_steps: 4
  num_epochs: 20
  max_train_steps: 5000
  resolution: 512
  mixed_precision: "fp16"
  save_every_n_steps: 500
  seed: 42

data:
  train_manifest: "data/train_manifest.csv"
  val_manifest: "data/val_manifest.csv"
  num_workers: 4

prompt:
  template: "professional product photography, studio lighting, clean white background, high quality, 4k, detailed"
  negative: "blurry, noisy, low quality, distorted, deformed, watermark, text"

logging:
  log_every_n_steps: 50
  sample_every_n_steps: 500
